name: Update GitHub Trophy

on:
  schedule:
    - cron: "0 10 * * *"   
  workflow_dispatch:       

jobs:
  update-trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch trophy image
        run: |
          curl -L "https://github-profile-trophy-8hd8.vercel.app/?username=nexuseli18&theme=light" \
          -o files/trophy.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add files/trophy.svg
          git diff --cached --quiet || git commit -m "Update trophy"
          git push